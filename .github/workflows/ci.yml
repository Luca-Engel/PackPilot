name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests and Coverage Verification
        id: test_step
        # Capture all output but preserve exit status. 
        # We wrap in subshell so we can capture the output even on failure.
        run: |
          set -o pipefail
          ./gradlew :composeApp:allTests :composeApp:koverVerify 2>&1 | tee build_output.log
        continue-on-error: true

      - name: Generate Coverage Summary
        if: always()
        run: |
          echo "### 📊 Test & Coverage Summary" >> $GITHUB_STEP_SUMMARY
          
          # Extract coverage values using grep and sed
          LOG_LINE=$(grep "Rule violated: lines covered percentage is" build_output.log || true)
          
          if [ ! -z "$LOG_LINE" ]; then
            ACTUAL=$(echo "$LOG_LINE" | sed -E 's/.*percentage is ([0-9]+\.[0-9]{2})[0-9]*.*/\1/')
            REQUIRED=$(echo "$LOG_LINE" | sed -E 's/.*minimum is ([0-9]+).*/\1/')
            
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo "| **Actual Coverage** | ${ACTUAL}% |" >> $GITHUB_STEP_SUMMARY
            echo "| **Required Minimum** | ${REQUIRED}% |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # If we found this line, it means Kover failed the verification
            echo "❌ **Verification Failed:** Your code coverage (${ACTUAL}%) is below the required ${REQUIRED}% threshold." >> $GITHUB_STEP_SUMMARY
          else
            if [ "${{ steps.test_step.outcome }}" == "success" ]; then
              echo "✅ **Verification Passed:** All tests passed and coverage threshold met." >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Build Error:** The tests failed or there was a build error. See details in the 'Run Tests' step." >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Finalize Status
        # Explicitly fail the job if the test_step was not successful
        if: steps.test_step.outcome != 'success'
        run: |
          echo "Failing build due to test failure or low coverage."
          exit 1

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/build/reports/kover/'
